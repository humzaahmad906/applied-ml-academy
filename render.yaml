services:
  - type: web
    name: applied-ml-academy
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: PASS_MARK
        value: "80"
      # Firebase service-account JSON (paste the whole file contents as the value
      # in the Render dashboard — sync:false means it is NOT stored in this repo).
      - key: FIREBASE_CREDENTIALS
        sync: false
