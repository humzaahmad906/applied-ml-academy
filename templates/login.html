{% extends "base.html" %}
{% block title %}Log in · {{ BRAND }}{% endblock %}
{% block body %}
<div class="wrap">
  <section>
    <div class="auth">
      <div class="eyebrow">Welcome back</div>
      <h2 class="section">Log in</h2>
      <p class="lead">Sign in to continue your courses.</p>
      <div class="card">
        <form method="post" action="{{ url_for('login') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}">
          <div class="field"><label for="email">Email</label>
            <input id="email" name="email" type="email" value="{{ email }}" autocomplete="email" autofocus></div>
          <div class="field"><label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password"></div>
          <button class="btn full" type="submit">Log in</button>
        </form>
      </div>
      <p class="auth-alt">New here?
        <a href="{{ url_for('register', next=request.args.get('next')) }}">Create a free account</a></p>
    </div>
  </section>
</div>
{% endblock %}
